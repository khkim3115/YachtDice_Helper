<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0c1020" />
    <meta name="description" content="요트다이스 게임 + 최적 EV 헬퍼. 설치하면 작업표시줄에서 바로 실행됩니다." />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon-180x180.png" />
    <title>Yacht Dice — 요트다이스</title>
    <script>
      // 첫 페인트 전에 테마를 적용해 깜빡임(FOUC)을 막는다. 초기 테마 결정의 단일 출처.
      (function () {
        try {
          var saved = localStorage.getItem('yd_theme');
          var mode = saved
            ? saved
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          document.documentElement.dataset.theme = mode;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
