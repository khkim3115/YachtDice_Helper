name: 🐛 버그 제보
description: 게임에서 발생한 버그나 오류를 알려주세요.
title: "[버그] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        제보해 주셔서 감사합니다! 가능하면 **재현 방법**과 **환경**을 적어주시면 더 빠르게 고칠 수 있어요.
        간단한 제보라면 사이트 상단 **💬 버튼**으로 GitHub 계정 없이 익명으로 보낼 수도 있어요.
  - type: textarea
    id: what
    attributes:
      label: 무슨 일이 있었나요?
      description: 어떤 동작을 했고 무엇이 잘못됐는지 적어주세요.
      placeholder: "예) 다시 굴리기를 눌렀더니 주사위가 사라졌어요."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 방법 (선택)
      description: 버그를 다시 만들 수 있는 순서가 있으면 적어주세요.
      placeholder: |
        1. 솔로 게임 시작
        2. 주사위 굴리기
        3. ...
    validations:
      required: false
  - type: input
    id: expected
    attributes:
      label: 기대한 동작 (선택)
      placeholder: "예) 보관하지 않은 주사위만 다시 굴려져야 해요."
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: 어디서 발생했나요? (선택)
      options:
        - 솔로 플레이
        - 온라인 멀티플레이
        - 리더보드
        - 헬퍼(EV 추천)
        - 데스크톱 트레이 앱
        - 기타 / 모르겠음
    validations:
      required: false
  - type: dropdown
    id: device
    attributes:
      label: 환경 (선택)
      options:
        - PC (웹브라우저)
        - 모바일 (웹브라우저)
        - 설치한 앱(PWA)
        - 데스크톱 트레이 앱
        - 기타 / 모르겠음
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: 버전 (선택)
      description: 상단 📋 패치노트에서 확인할 수 있어요.
      placeholder: "예) v0.5.0"
    validations:
      required: false
