name: Build Desktop Tray App

# 릴리스를 publish 하면 Windows 트레이 설치 파일(YachtDice-Tray-Setup.exe)을
# 자동으로 빌드해 그 릴리스에 첨부한다. 웹 홈의 다운로드 링크
# (releases/latest/download/YachtDice-Tray-Setup.exe)가 바로 신버전을 받게 된다.
# 수동 실행(workflow_dispatch) 시에는 빌드 결과를 워크플로 아티팩트로 내려받을 수 있다.
on:
  release:
    types: [published]
  workflow_dispatch:

# GITHUB_TOKEN 권한: 릴리스에 설치 파일 업로드
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci

      # electron-builder → desktop/release/YachtDice-Tray-Setup.exe (NSIS)
      # 데스크톱은 자립형(popup.html + vendor/supabase.js) — 루트 웹 빌드(../dist) 불필요.
      - name: Build installer
        run: npm run dist
        env:
          # 코드 서명 인증서 없음 — 자동 탐색 꺼서 서명 시도/실패 방지.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 두 트리거 모두에서 받을 수 있도록 워크플로 아티팩트로도 업로드.
      # (path 는 저장소 루트 기준 — defaults.working-directory 는 run 스텝에만 적용)
      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: YachtDice-Tray-Setup
          path: desktop/release/YachtDice-Tray-Setup.exe
          if-no-files-found: error

      # 릴리스 이벤트면 그 릴리스에 설치 파일 첨부(재실행 대비 --clobber).
      - name: Attach installer to the release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "release/YachtDice-Tray-Setup.exe" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
