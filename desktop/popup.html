<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>설정</title>
    <script>
      // 첫 페인트 전에 테마 적용(깜빡임 방지). localStorage 는 캐시일 뿐 —
      // 진짜 출처는 메인의 settings.json 이며, 로드 직후 yd.onTheme 로 덮어쓴다.
      (function () {
        try {
          var m = localStorage.getItem('yd_theme');
          document.documentElement.dataset.theme = m === 'light' ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <style>
      /* 눈에 띄지 않게 — 어두운 단색(검정/회색)만. 파랑/노랑/초록 없음. */
      :root {
        --bg: #0b0b0d;
        --panel: #151518;
        --panel2: #1d1d21;
        --panel3: #26262b;
        --line: #2a2a2f;
        --txt: #c6c6cd;
        --mut: #71717a;
        --emph: #d7d7de;
        --hold: #56565f; /* held-die / focus / 현재 턴 테두리 */
        --klabel: #50505a; /* .k 단축키 라벨 */
        --overlay: rgba(0, 0, 0, 0.9); /* 게임오버·리더보드 오버레이 배경 */
      }
      /* 라이트 테마 — 다크 :root 를 덮어쓴다. 파랑/노랑/초록 없이 밝은 단색(흰/회색)만.
         배경/패널은 밝게 뒤집되 위계(bg < panel < panel2 < panel3)는 유지, 글자는 어둡게. */
      :root[data-theme='light'] {
        --bg: #f4f4f5;
        --panel: #ffffff;
        --panel2: #f1f1f3;
        --panel3: #e6e6e9;
        --line: #d8d8dd;
        --txt: #3f3f46;
        --mut: #8a8a93;
        --emph: #18181b;
        --hold: #a8a8b0;
        --klabel: #a1a1aa;
        --overlay: rgba(255, 255, 255, 0.92);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: 'Segoe UI', system-ui, 'Malgun Gothic', sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      #app { display: flex; flex-direction: column; height: 100vh; padding: 7px 8px 8px; gap: 6px; }

      .top { display: flex; align-items: center; justify-content: space-between; }
      .logo { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--mut); }
      .x { border: none; background: transparent; color: var(--mut); font-size: 11px; cursor: pointer; padding: 2px 4px; line-height: 1; }
      .x:hover { color: var(--txt); }

      /* ── 창 드래그 이동 — 헤더(.top) 빈 영역/로고를 잡고 끌면 창이 따라온다(main.js 의 movable:true 와 한 쌍).
         헤더 안의 클릭 요소(버튼·입력·투명도 팝오버)는 no-drag 로 되돌려야 클릭이 막히지 않는다. ── */
      .top { -webkit-app-region: drag; }
      .top button, .top input, .top a, .opacity-pop, .opacity-pop input { -webkit-app-region: no-drag; }

      /* ── 투명도 팝오버 — 헤더 🔅 버튼으로 토글, 클릭한 버튼 아래 우측에 고정(JS가 top/right 지정). ── */
      .opacity-pop {
        position: fixed; z-index: 50;
        display: flex; align-items: center; gap: 7px;
        padding: 7px 9px; border-radius: 8px;
        background: var(--panel2); border: 1px solid var(--line);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
      }
      .opacity-pop.hidden { display: none; }
      .opacity-pop input[type='range'] {
        -webkit-appearance: none; appearance: none;
        width: 110px; height: 4px; border-radius: 3px; margin: 0;
        background: var(--panel3); cursor: pointer; outline: none;
      }
      .opacity-pop input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 13px; height: 13px; border-radius: 50%;
        background: var(--emph); border: 1px solid var(--line); cursor: pointer;
      }
      .opacity-val { font-size: 10px; color: var(--mut); min-width: 30px; text-align: right; font-variant-numeric: tabular-nums; }

      .dice { display: flex; gap: 4px; justify-content: center; }
      .die {
        position: relative;
        width: 30px; height: 30px; border-radius: 5px;
        background: var(--panel2); border: 1px solid var(--line); color: var(--emph);
        display: grid; place-items: center; font-size: 15px; font-weight: 700;
        cursor: pointer; flex: none;
      }
      .die.empty { color: transparent; background: var(--panel); }
      .die.held { border-color: var(--hold); background: var(--panel3); }

      .roll {
        border: 1px solid var(--line); border-radius: 5px; padding: 7px; font-size: 12px; font-weight: 600;
        color: var(--txt); cursor: pointer; background: var(--panel2);
      }
      .roll:hover { background: var(--panel3); }
      .roll:disabled { opacity: 0.45; cursor: default; }

      .cats { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
      .cat {
        display: flex; align-items: center; justify-content: space-between;
        border: 1px solid var(--line); border-radius: 4px; background: var(--panel);
        padding: 4px 6px; font-size: 10.5px; cursor: default; color: var(--mut);
        text-align: left; gap: 4px; min-width: 0;
      }
      .cat .nm { color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .k { font-size: 8px; color: var(--klabel); text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px; }
      .cat .k { display: inline-block; min-width: 8px; margin-right: 4px; }
      .die .k { position: absolute; top: 1px; left: 3px; line-height: 1; }
      .x .k { margin-right: 4px; }
      .roll .k, .again .k { margin-left: 5px; }
      .cat .pt { font-variant-numeric: tabular-nums; flex: none; }
      .cat.able { cursor: pointer; background: var(--panel2); border-color: var(--panel3); }
      .cat.able .pt { color: var(--emph); }
      .cat.able:hover { background: var(--panel3); }
      .cat.filled { opacity: 0.4; }
      .cat.filled .pt { color: var(--txt); }

      .foot { display: flex; align-items: center; justify-content: space-between; font-size: 10.5px; color: var(--mut); }
      .foot .total { font-size: 13px; font-weight: 700; color: var(--emph); }
      .foot .total small { font-size: 9px; color: var(--mut); font-weight: 600; }
      .bonus { color: var(--mut); }
      .new { border: 1px solid var(--line); background: var(--panel2); color: var(--mut); border-radius: 4px; padding: 3px 7px; cursor: pointer; font-size: 11px; }
      .new:hover { color: var(--txt); }
      /* 추가 룰(무채색 유지): 요트의 달인 타깃·보너스 칸·규칙 칩·힌트 */
      .cat.master { border-color: var(--hold); background: var(--panel3); }
      .cat.master .pt { color: var(--emph); font-weight: 700; }
      .mbadge { display: inline-block; margin-left: 4px; padding: 0 4px; border-radius: 6px; background: var(--panel3); color: var(--emph); font-size: 7.5px; font-weight: 700; vertical-align: middle; }
      .rule-chip { border: 1px solid var(--line); background: var(--panel2); color: var(--mut); border-radius: 4px; padding: 3px 7px; cursor: pointer; font-size: 10.5px; font-weight: 600; }
      .rule-chip:hover { color: var(--txt); }
      .solo-hint { font-size: 10px; color: var(--emph); text-align: center; padding: 2px 0; }
      .solo-hint.hidden { display: none; }
      .mp-rule-line { font-size: 10px; color: var(--mut); text-align: center; }

      .over { position: fixed; inset: 0; background: var(--overlay); display: grid; place-items: center; }
      .over.hidden { display: none; }
      .overcard { text-align: center; }
      .overcard .big { font-size: 36px; font-weight: 700; color: var(--emph); line-height: 1; }
      .overcard .ko { color: var(--mut); font-size: 11px; margin: 4px 0 12px; }
      .again { border: 1px solid var(--line); border-radius: 5px; padding: 7px 18px; font-weight: 600; color: var(--txt); cursor: pointer; background: var(--panel2); }
      .again:hover { background: var(--panel3); }

      /* ── 리더보드 ── */
      .top-btns { display: flex; align-items: center; gap: 2px; }
      .lb-reg { margin: 12px auto 0; display: flex; flex-direction: column; gap: 5px; width: 152px; }
      .lb-input { background: var(--panel2); border: 1px solid var(--line); border-radius: 4px; color: var(--txt); padding: 5px 7px; font-size: 11px; font-family: inherit; outline: none; text-align: center; }
      .lb-input:focus { border-color: var(--hold); }
      .lb-btn { border: 1px solid var(--line); border-radius: 4px; background: var(--panel2); color: var(--txt); padding: 5px; font-size: 11px; font-weight: 600; cursor: pointer; }
      .lb-btn:hover { background: var(--panel3); }
      .lb-btn:disabled { opacity: 0.5; cursor: default; }
      .lb-msg { font-size: 10px; color: var(--mut); min-height: 12px; text-align: center; }
      .lbcard { width: 232px; max-height: 320px; display: flex; flex-direction: column; gap: 8px; }
      .lbtitle { font-size: 12px; font-weight: 700; color: var(--emph); text-align: center; }
      .lblist { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; }
      .lbrow { display: grid; grid-template-columns: 20px 1fr auto; align-items: center; gap: 6px; padding: 4px 7px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel); font-size: 11px; }
      .lbrank { color: var(--mut); font-size: 10px; font-weight: 700; text-align: center; }
      .lbnm { color: var(--txt); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .lbsc { color: var(--emph); font-weight: 700; font-variant-numeric: tabular-nums; }
      .lb-load { color: var(--mut); font-size: 11px; text-align: center; padding: 16px 0; }

      /* ── 멀티플레이 ── */
      .hidden { display: none !important; }
      #mp { height: 100vh; position: relative; }
      .mp-screen { height: 100vh; }
      #mp-lobby { display: flex; flex-direction: column; height: 100vh; padding: 7px 8px 8px; gap: 6px; }
      .mp-form { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
      .mp-or { text-align: center; font-size: 10px; color: var(--mut); margin: 2px 0; }
      .mp-code-row { font-size: 12px; color: var(--txt); text-align: center; margin-top: 2px; }
      .mp-code-row b { color: var(--emph); letter-spacing: 2px; font-size: 15px; }
      .mp-code-copy { margin-left: 6px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel2); color: var(--txt); padding: 2px 7px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; vertical-align: middle; }
      .mp-code-copy:hover { background: var(--panel3); }
      .mp-players { display: flex; flex-direction: column; gap: 4px; }
      .mp-tag { font-size: 8px; color: var(--mut); border: 1px solid var(--line); border-radius: 3px; padding: 0 3px; }
      .mp-hint { font-size: 9px; color: var(--mut); }
      #mp-game { display: flex; gap: 6px; height: 100vh; padding: 7px 8px 8px; }
      .mp-main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
      .mp-side { flex: 0 0 130px; border-left: 1px solid var(--line); padding-left: 6px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
      .mp-side .ph { font-size: 9px; color: var(--mut); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; }
      .mp-prow { display: grid; grid-template-columns: 1fr auto; gap: 4px; align-items: center; border: 1px solid var(--line); border-radius: 4px; background: var(--panel); padding: 4px 6px; font-size: 10.5px; cursor: pointer; }
      .mp-prow.turn { border-color: var(--hold); background: var(--panel2); }
      .mp-prow.selected { background: var(--panel3); border-color: var(--emph); }
      .mp-prow:hover { border-color: var(--emph); }
      .mp-prow .pn { color: var(--txt); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .mp-prow .ps { color: var(--emph); font-weight: 700; font-variant-numeric: tabular-nums; }
      .mp-prow .pf { font-size: 8px; color: var(--mut); font-weight: 600; }
      /* 선택 플레이어 상세(2열 그리드) */
      .mp-side-detail { margin-top: 5px; border-top: 1px solid var(--line); padding-top: 5px; }
      .mp-dhead { margin-bottom: 3px; }
      .mp-dgrid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 6px; }
      .mp-dcell { display: flex; justify-content: space-between; align-items: baseline; gap: 3px; font-size: 9.5px; padding: 1.5px 0; }
      .mp-dcell .dnm { color: var(--mut); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .mp-dcell .dpt { color: var(--txt); font-weight: 700; font-variant-numeric: tabular-nums; }
      .mp-dcell .dpt.e { color: var(--mut); font-weight: 400; }
      .mp-dsum { display: flex; justify-content: space-between; gap: 4px; margin-top: 4px; padding-top: 3px; border-top: 1px dashed var(--line); font-size: 9.5px; color: var(--mut); }
      .mp-dsum span:last-child { color: var(--emph); font-weight: 700; }
      #mp-over { display: grid; place-items: center; height: 100vh; }
      /* 채팅(전체 화면 오버레이; broadcast, 웹과 동일 채널/이벤트/payload) */
      .mp-chat-toggle { position: relative; }
      .mp-chat-badge { position: absolute; top: -3px; right: -3px; min-width: 13px; height: 13px; padding: 0 3px; border-radius: 7px; background: var(--emph); color: var(--bg); font-size: 8px; font-weight: 700; display: grid; place-items: center; line-height: 1; }
      .mp-chat { position: absolute; inset: 0; z-index: 20; background: var(--bg); display: flex; flex-direction: column; padding: 7px 8px 8px; gap: 6px; }
      .mp-chat-msgs { flex: 1 1 auto; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding: 2px 1px; }
      .mp-chat-empty { margin: auto; color: var(--mut); font-size: 11px; text-align: center; padding: 0 12px; }
      .mp-chat-msg { display: flex; flex-direction: column; align-items: flex-start; max-width: 88%; }
      .mp-chat-msg.me { align-self: flex-end; align-items: flex-end; }
      .mp-chat-meta { display: flex; gap: 5px; align-items: baseline; margin-bottom: 1px; }
      .mp-chat-name { font-size: 9px; font-weight: 700; color: var(--mut); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .mp-chat-msg.me .mp-chat-name { color: var(--emph); }
      .mp-chat-time { font-size: 8.5px; color: var(--mut); font-variant-numeric: tabular-nums; }
      .mp-chat-bubble { padding: 5px 8px; border-radius: 8px; background: var(--panel2); color: var(--txt); font-size: 11px; line-height: 1.35; word-break: break-word; overflow-wrap: anywhere; white-space: pre-wrap; }
      .mp-chat-msg.me .mp-chat-bubble { background: var(--panel3); color: var(--emph); }
      .mp-chat-input { display: flex; gap: 5px; }
      .mp-chat-input .lb-input { flex: 1 1 auto; text-align: left; }
      .mp-chat-input .lb-btn { flex: 0 0 auto; padding: 5px 10px; }
    </style>
    <script src="./vendor/supabase.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="top">
        <span class="logo">설정</span>
        <div class="top-btns">
          <button class="x opacity-toggle" id="op-solo" title="투명도" tabindex="-1">🔅</button>
          <button class="x theme-toggle" id="theme-solo" title="라이트 모드로" tabindex="-1">☀️</button>
          <button class="x" id="lb-open" title="리더보드" tabindex="-1">🏆</button>
          <button class="x" id="close" title="닫기 (Esc)" tabindex="-1"><span class="k">Esc</span>✕</button>
        </div>
      </div>
      <div class="dice" id="dice"></div>
      <button class="roll" id="roll" tabindex="-1">굴리기</button>
      <div class="cats" id="cats"></div>
      <div class="solo-hint hidden" id="solo-hint"></div>
      <div class="foot">
        <span class="total" id="total">0<small> 점</small></span>
        <button class="rule-chip" id="rule-toggle" title="규칙 전환 (새 게임)" tabindex="-1">기본 룰</button>
        <span id="turn">1 / 12</span>
        <button class="new" id="new" title="새로" tabindex="-1">↺ 새로</button>
      </div>
    </div>

    <!-- ── 멀티플레이 컨테이너(솔로일 땐 hidden) ── -->
    <div id="mp" class="hidden">
      <!-- 로비 -->
      <div id="mp-lobby" class="mp-screen hidden">
        <div class="top">
          <span class="logo">멀티플레이</span>
          <div class="top-btns">
            <button class="x mp-chat-toggle hidden" id="mp-chat-open-l" title="채팅" tabindex="-1">💬<span class="mp-chat-badge hidden"></span></button>
            <button class="x opacity-toggle" id="op-mpl" title="투명도" tabindex="-1">🔅</button>
            <button class="x theme-toggle" id="theme-mpl" title="라이트 모드로" tabindex="-1">☀️</button>
            <button class="x" id="mp-leave" title="닫기 (Esc)" tabindex="-1"><span class="k">Esc</span>✕</button>
          </div>
        </div>
        <div id="mp-entry" class="mp-form">
          <input class="lb-input" id="mp-name" maxlength="24" placeholder="닉네임" />
          <button class="lb-btn rule-chip" id="mp-rule-toggle" title="방 규칙 전환" tabindex="-1">기본 룰</button>
          <button class="lb-btn" id="mp-create" tabindex="-1">방 만들기</button>
          <div class="mp-or">— 또는 —</div>
          <input class="lb-input" id="mp-code" maxlength="6" placeholder="방 코드" />
          <button class="lb-btn" id="mp-join" tabindex="-1">참가</button>
          <div class="lb-msg" id="mp-msg"></div>
        </div>
        <div id="mp-room" class="mp-form hidden">
          <div class="mp-code-row">방 코드 <b id="mp-code-show"></b><button class="mp-code-copy" id="mp-code-copy" tabindex="-1">복사</button></div>
          <div class="mp-rule-line" id="mp-rule-line"></div>
          <div class="mp-players" id="mp-players"></div>
          <button class="lb-btn" id="mp-start" tabindex="-1">게임 시작</button>
          <button class="new" id="mp-room-leave" tabindex="-1">방 나가기</button>
          <div class="lb-msg" id="mp-room-msg"></div>
        </div>
      </div>

      <!-- 게임 -->
      <div id="mp-game" class="mp-screen hidden">
        <div class="mp-main">
          <div class="top">
            <span class="logo" id="mp-turn-label">멀티</span>
            <div class="top-btns">
              <button class="x mp-chat-toggle" id="mp-chat-open-g" title="채팅" tabindex="-1">💬<span class="mp-chat-badge hidden"></span></button>
              <button class="x opacity-toggle" id="op-mpg" title="투명도" tabindex="-1">🔅</button>
              <button class="x theme-toggle" id="theme-mpg" title="라이트 모드로" tabindex="-1">☀️</button>
              <button class="x" id="mp-game-quit" title="방 나가기" tabindex="-1">나가기</button>
              <button class="x" id="mp-game-leave" title="닫기 (Esc)" tabindex="-1"><span class="k">Esc</span>✕</button>
            </div>
          </div>
          <div class="dice" id="mp-dice"></div>
          <button class="roll" id="mp-roll" tabindex="-1">굴리기</button>
          <div class="cats" id="mp-cats"></div>
          <div class="foot">
            <span class="total" id="mp-total">0<small> 점</small></span>
            <span id="mp-round">1 / 12</span>
            <span class="mp-hint" title="상대 점수 보기"><span class="k">`</span> 상대</span>
          </div>
          <div class="lb-msg" id="mp-game-msg"></div>
        </div>
        <div class="mp-side hidden" id="mp-side"></div>
      </div>

      <!-- 종료 -->
      <div id="mp-over" class="mp-screen hidden">
        <div class="overcard">
          <div class="big" id="mp-final">0</div>
          <div class="ko" id="mp-result">완료</div>
          <button class="again" id="mp-again" tabindex="-1">로비로<span class="k">Enter</span></button>
          <div class="lb-reg">
            <input class="lb-input" id="mp-lb-name" maxlength="24" placeholder="닉네임" />
            <button class="lb-btn" id="mp-lb-submit" tabindex="-1">🏆 리더보드 등록</button>
            <div class="lb-msg" id="mp-lb-msg"></div>
          </div>
        </div>
      </div>

      <!-- 채팅(전체화면 오버레이; 로비·게임 공용) -->
      <div id="mp-chat" class="mp-chat hidden">
        <div class="top">
          <span class="logo">채팅</span>
          <div class="top-btns">
            <button class="x" id="mp-chat-close" title="닫기 (Esc)" tabindex="-1"><span class="k">Esc</span>✕</button>
          </div>
        </div>
        <div class="mp-chat-msgs" id="mp-chat-msgs"></div>
        <div class="mp-chat-input">
          <input class="lb-input" id="mp-chat-text" maxlength="200" placeholder="메시지…" />
          <button class="lb-btn" id="mp-chat-send" tabindex="-1">전송</button>
        </div>
      </div>
    </div>

    <div class="over hidden" id="over">
      <div class="overcard">
        <div class="big" id="final">0</div>
        <div class="ko">완료</div>
        <button class="again" id="again" tabindex="-1">다시<span class="k">Enter</span></button>
        <div class="lb-reg">
          <input class="lb-input" id="lb-name" maxlength="24" placeholder="닉네임" />
          <button class="lb-btn" id="lb-submit" tabindex="-1">🏆 리더보드 등록</button>
          <div class="lb-msg" id="lb-msg"></div>
        </div>
      </div>
    </div>

    <div class="over hidden" id="lb-over">
      <div class="lbcard">
        <div class="lbtitle">🏆 리더보드 Top 10</div>
        <div class="lblist" id="lb-list"></div>
        <button class="again" id="lb-close" tabindex="-1">닫기<span class="k">Esc</span></button>
      </div>
    </div>

    <!-- 투명도 슬라이더 팝오버(헤더 🔅 공용; 창 전체 투명도 조절. 최소 30%) -->
    <div id="opacity-pop" class="opacity-pop hidden">
      <input type="range" id="opacity-range" min="30" max="100" step="1" value="100" tabindex="-1" />
      <span class="opacity-val" id="opacity-val">100%</span>
    </div>

    <script>
      // ── 최소 싱글플레이 요트다이스 ──
      const CATS = [
        { id: 'ones', nm: '원', fn: (d) => up(d, 1) },
        { id: 'twos', nm: '투', fn: (d) => up(d, 2) },
        { id: 'threes', nm: '쓰리', fn: (d) => up(d, 3) },
        { id: 'fours', nm: '포', fn: (d) => up(d, 4) },
        { id: 'fives', nm: '파이브', fn: (d) => up(d, 5) },
        { id: 'sixes', nm: '식스', fn: (d) => up(d, 6) },
        { id: 'choice', nm: '초이스', fn: (d) => sum(d) },
        { id: 'fourkind', nm: '포카드', fn: (d) => (maxCount(d) >= 4 ? sum(d) : 0) },
        { id: 'fullhouse', nm: '풀하우스', fn: fullHouse },
        { id: 'small', nm: '스몰', fn: (d) => (straight(d) >= 4 ? 15 : 0) },
        { id: 'large', nm: '라지', fn: (d) => (straight(d) >= 5 ? 30 : 0) },
        { id: 'yacht', nm: '요트', fn: (d) => (maxCount(d) === 5 ? 50 : 0) },
      ];
      const UPPER = ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'];
      // 단축키: 주사위 잠금 1~5, 점수 12칸 = QWERTYUIOP[] (CATS 순서).
      const HOLD_KEYS = ['1', '2', '3', '4', '5'];
      const CAT_KEYS = ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p', '[', ']'];

      function counts(d) { const c = [0, 0, 0, 0, 0, 0, 0]; d.forEach((x) => c[x]++); return c; }
      function up(d, n) { return d.filter((x) => x === n).length * n; }
      function sum(d) { return d.reduce((a, b) => a + b, 0); }
      function maxCount(d) { return Math.max(...counts(d).slice(1)); }
      function fullHouse(d) { const c = counts(d).slice(1).filter((x) => x > 0).sort(); return c.length === 2 && c[0] === 2 && c[1] === 3 ? sum(d) : 0; }
      function straight(d) {
        const s = [...new Set(d)].sort((a, b) => a - b);
        let run = 1, best = 1;
        for (let i = 1; i < s.length; i++) { if (s[i] === s[i - 1] + 1) { run++; best = Math.max(best, run); } else run = 1; }
        return best;
      }

      // ── 추가 룰(웹 src/core/rules.ts·gameState.ts 와 동일 로직) ──
      // 요트의 달인: 요트(50) 기록 후 또 5개 같은 눈 → 빈 칸 1개를 보너스 칸으로 소비(+100, 반복).
      //   보너스 칸은 총점엔 더하되 상단 소계·하단4종 판정에선 제외.
      // 요트도 포커처럼: 하단 4종(포카드·풀하우스·스몰·라지)을 모두 실제 조합(>0)으로 → 총점 +50.
      const LOWER_FOUR_LOCAL = ['fourkind', 'fullhouse', 'small', 'large'];
      const LOWER_FOUR_SRV = ['fourKind', 'fullHouse', 'smallStraight', 'largeStraight'];
      const RULE_KO = { default: '기본 룰', additional: '추가 룰' };
      function loadPreset() {
        try { return localStorage.getItem('yd_rule_preset') === 'additional' ? 'additional' : 'default'; }
        catch { return 'default'; }
      }
      let soloPreset = loadPreset();
      function setSoloPreset(p) {
        soloPreset = p === 'additional' ? 'additional' : 'default';
        try { localStorage.setItem('yd_rule_preset', soloPreset); } catch {}
        reset(); // 규칙 변경 시 새 게임.
      }

      let state;
      function reset() {
        state = { dice: [1, 1, 1, 1, 1], held: [false, false, false, false, false], rolls: 3, rolled: false, filled: {}, master: [], turn: 0 };
        document.getElementById('over').classList.add('hidden');
        render();
      }

      function roll() {
        if (state.rolls <= 0) return;
        state.dice = state.dice.map((v, i) => (state.rolled && state.held[i] ? v : 1 + Math.floor(Math.random() * 6)));
        state.rolls--;
        state.rolled = true;
        render();
      }

      function toggleHold(i) {
        if (!state.rolled || state.rolls === 0 || state.rolls === 3) return;
        state.held[i] = !state.held[i];
        render();
      }

      // 요트의 달인 발동 중인지(요트 50 기록 + 최종 주사위 5개 같은 눈).
      function masterActive() {
        return soloPreset === 'additional' && state.rolled && state.filled.yacht === 50 && maxCount(state.dice) === 5;
      }
      function pick(cat) {
        if (!state.rolled || state.filled[cat.id] != null || state.master.includes(cat.id)) return;
        if (masterActive()) {
          // 정상 채점 대신 고른 빈 칸에 보너스 100 기록(보너스 칸).
          state.filled[cat.id] = 100;
          state.master.push(cat.id);
        } else {
          state.filled[cat.id] = cat.fn(state.dice);
        }
        state.turn++;
        if (state.turn >= 12) return gameOver();
        state.dice = [1, 1, 1, 1, 1];
        state.held = [false, false, false, false, false];
        state.rolls = 3;
        state.rolled = false;
        render();
      }

      // 보너스 칸은 상단 소계에서 제외(웹과 동일).
      function upperSub() { return UPPER.reduce((a, id) => a + (state.master.includes(id) ? 0 : (state.filled[id] || 0)), 0); }
      function bonus() { return upperSub() >= 63 ? 35 : 0; }
      // 요트도 포커처럼: 하단 4종을 모두 실제 조합(>0, 보너스 칸 제외)으로 채우면 +50.
      function lowerFourDone() {
        if (soloPreset !== 'additional') return false;
        return LOWER_FOUR_LOCAL.every((id) => !state.master.includes(id) && (state.filled[id] || 0) > 0);
      }
      function lowerFourBonus() { return lowerFourDone() ? 50 : 0; }
      // 총점 = 모든 칸 합(보너스 칸 100 포함) + 상단 보너스 + 요트도 포커처럼.
      function total() {
        return Object.values(state.filled).reduce((a, b) => a + b, 0) + bonus() + lowerFourBonus();
      }

      let finalScore = 0;
      let finalPreset = 'default'; // 종료 시점의 규칙(리더보드 등록·조회용).
      let lbSubmitted = false; // 이번 게임 점수를 이미(또는 진행 중) 등록했는지 — 중복 등록 방지.
      function gameOver() {
        render();
        finalScore = total();
        finalPreset = soloPreset;
        document.getElementById('final').textContent = finalScore;
        document.getElementById('over').classList.remove('hidden');
        // 리더보드 등록 UI 초기화(데스크톱은 헬퍼가 없어 항상 등록 가능).
        const msg = document.getElementById('lb-msg');
        const btn = document.getElementById('lb-submit');
        const nm = document.getElementById('lb-name');
        if (msg) msg.textContent = '';
        if (btn) btn.disabled = false;
        lbSubmitted = false; // 새 게임 점수 → 다시 등록 가능.
        try { if (nm) nm.value = localStorage.getItem('yd_lb_name') || ''; } catch {}
      }

      const diceEl = document.getElementById('dice');
      const catsEl = document.getElementById('cats');

      function render() {
        diceEl.innerHTML = '';
        state.dice.forEach((v, i) => {
          const d = document.createElement('button');
          d.tabIndex = -1;
          d.className = 'die' + (state.held[i] ? ' held' : '') + (state.rolled ? '' : ' empty');
          d.innerHTML = `<span class="k">${i + 1}</span>` + (state.rolled ? `<span class="face">${v}</span>` : '');
          d.onclick = () => toggleHold(i);
          diceEl.appendChild(d);
        });

        const rollBtn = document.getElementById('roll');
        rollBtn.innerHTML = state.rolls > 0 ? `굴리기 (${state.rolls}) <span class="k">Space</span>` : '기록';
        rollBtn.disabled = state.rolls <= 0;

        const mp = masterActive();
        catsEl.innerHTML = '';
        CATS.forEach((cat, idx) => {
          const isMaster = state.master.includes(cat.id);
          const filled = state.filled[cat.id] != null || isMaster;
          const able = !filled && state.rolled;
          const b = document.createElement('button');
          b.tabIndex = -1;
          b.className = 'cat' + (filled ? ' filled' : '') + (able ? ' able' : '') + (mp && able ? ' master' : '');
          let pt;
          if (filled) pt = state.filled[cat.id];
          else if (mp) pt = '+100';
          else pt = state.rolled ? cat.fn(state.dice) : '·';
          const badge = isMaster ? '<span class="mbadge">달인</span>' : '';
          b.innerHTML = `<span class="nm"><span class="k">${CAT_KEYS[idx]}</span>${cat.nm}${badge}</span><span class="pt">${pt}</span>`;
          if (able) b.onclick = () => pick(cat);
          catsEl.appendChild(b);
        });

        // 규칙 칩 + 추가 룰 상태 힌트.
        const chip = document.getElementById('rule-toggle');
        if (chip) chip.textContent = RULE_KO[soloPreset];
        const hint = document.getElementById('solo-hint');
        if (hint) {
          if (mp) {
            hint.textContent = '🎯 요트의 달인! 빈 칸을 골라 +100';
            hint.classList.remove('hidden');
          } else if (soloPreset === 'additional') {
            const done = LOWER_FOUR_LOCAL.filter((id) => !state.master.includes(id) && (state.filled[id] || 0) > 0).length;
            hint.textContent = `요트도 포커처럼 ${done}/4` + (lowerFourDone() ? ' ✓ +50' : '');
            hint.classList.remove('hidden');
          } else {
            hint.classList.add('hidden');
          }
        }

        const bn = bonus();
        document.getElementById('total').innerHTML =
          `${total()}<small> 점</small>` + (bn ? ` <span class="bonus">+${bn}</span>` : '');
        document.getElementById('turn').textContent = `${Math.min(state.turn + 1, 12)} / 12`;
      }

      document.getElementById('roll').onclick = roll;
      document.getElementById('new').onclick = reset;
      document.getElementById('again').onclick = reset;
      document.getElementById('rule-toggle').onclick = () =>
        setSoloPreset(soloPreset === 'default' ? 'additional' : 'default');
      // 닫지 않고 숨기기만(상태 유지). preload 미주입 시 close 로 폴백.
      const hidePopup = () => (window.yd ? window.yd.hide() : window.close());
      document.getElementById('close').onclick = hidePopup;

      // ── 테마 토글(☀️/🌙) — 모든 화면 헤더의 .theme-toggle 버튼 공용 ──
      function applyTheme(mode) {
        const m = mode === 'light' ? 'light' : 'dark';
        document.documentElement.dataset.theme = m;
        try { localStorage.setItem('yd_theme', m); } catch (_) {}
        // 버튼은 '다음에 바뀔 테마'를 가리킨다(다크면 ☀️=라이트로, 라이트면 🌙=다크로).
        document.querySelectorAll('.theme-toggle').forEach((b) => {
          b.textContent = m === 'light' ? '🌙' : '☀️';
          b.title = m === 'light' ? '다크 모드로' : '라이트 모드로';
        });
      }
      function toggleTheme() {
        const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
        applyTheme(next); // 즉시 적용 + 캐시
        if (window.yd && window.yd.setTheme) window.yd.setTheme(next); // 메인(settings.json)에 영속화
      }
      document.querySelectorAll('.theme-toggle').forEach((b) => { b.onclick = toggleTheme; });
      applyTheme(document.documentElement.dataset.theme); // 버튼 아이콘을 현재 테마에 맞춤

      // ── 투명도(🔅) — 헤더 버튼으로 팝오버 토글, 슬라이더로 창 투명도 조절 ──
      // 메인(settings.json)이 단일 출처. 드래그 중(input)엔 실시간 적용만, 끝(change)에만 저장.
      const opPop = document.getElementById('opacity-pop');
      const opRange = document.getElementById('opacity-range');
      const opVal = document.getElementById('opacity-val');
      function applyOpacityUI(v) {
        const n = Math.max(30, Math.min(100, Math.round(Number(v) || 100)));
        opRange.value = String(n);
        opVal.textContent = n + '%';
      }
      function closeOpacityPop() { opPop.classList.add('hidden'); }
      function toggleOpacityPop(btn) {
        if (!opPop.classList.contains('hidden')) { closeOpacityPop(); return; }
        const r = btn.getBoundingClientRect(); // 클릭한 버튼 아래·우측 정렬(헤더 3종 모두 대응)
        opPop.style.top = Math.round(r.bottom + 4) + 'px';
        opPop.style.left = 'auto';
        opPop.style.right = Math.round(window.innerWidth - r.right) + 'px';
        opPop.classList.remove('hidden');
        // 좁은 헤더(mp-game)에서 우측 정렬 시 팝오버가 화면 왼쪽으로 잘리면 좌측(8px)으로 보정.
        if (opPop.getBoundingClientRect().left < 8) { opPop.style.right = 'auto'; opPop.style.left = '8px'; }
      }
      document.querySelectorAll('.opacity-toggle').forEach((b) => {
        b.onclick = (e) => { e.stopPropagation(); toggleOpacityPop(b); }; // stopPropagation: 바깥클릭 닫힘과 충돌 방지
      });
      opRange.addEventListener('input', () => {
        applyOpacityUI(opRange.value);
        if (window.yd && window.yd.setOpacity) window.yd.setOpacity(Number(opRange.value), false); // 실시간 적용만
      });
      opRange.addEventListener('change', () => {
        if (window.yd && window.yd.setOpacity) window.yd.setOpacity(Number(opRange.value), true); // 드래그 끝 → 저장
      });
      // 팝오버 바깥 클릭 → 닫기(슬라이더·토글 버튼 클릭은 제외).
      document.addEventListener('click', (e) => {
        if (opPop.classList.contains('hidden')) return;
        if (opPop.contains(e.target) || (e.target.closest && e.target.closest('.opacity-toggle'))) return;
        closeOpacityPop();
      });
      // 팝오버가 열려 있는 동안엔 모든 키를 capture 단계에서 가로채 게임 단축키(Space·문자·숫자·백틱)가
      // 배경에서 실행되는 것을 막는다. Esc=닫기, 슬라이더 포커스 시 방향키만 통과(값 조절).
      const OP_SLIDER_KEYS = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End', 'PageUp', 'PageDown'];
      document.addEventListener('keydown', (e) => {
        if (opPop.classList.contains('hidden')) return; // 닫혀있으면 평소대로
        if (e.key === 'Escape') { e.preventDefault(); e.stopImmediatePropagation(); closeOpacityPop(); return; }
        if (document.activeElement === opRange && OP_SLIDER_KEYS.includes(e.key)) return; // 슬라이더 값 조절은 허용
        e.preventDefault(); e.stopImmediatePropagation(); // 그 외 단축키는 무시(투명도 조절 중)
      }, true);
      // 창 폭/크기 변경(예: 멀티 상대패널 백틱 토글 → setBounds) 시 고정 좌표가 어긋나므로 팝오버를 닫는다.
      window.addEventListener('resize', () => { if (!opPop.classList.contains('hidden')) closeOpacityPop(); });

      // ── 리더보드(Supabase REST 직접 호출, 익명 anon 키) ──
      // publishable 키는 공개용 — 커밋·배포 안전(service_role 아님).
      const SB_URL = 'https://wrdeqbqwxnmjsbwwnatx.supabase.co';
      const SB_KEY = 'sb_publishable_3QuWFZBMzYOdMpfkMjROtw_FBex-xM6';
      const SB_HEADERS = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
      const nameInput = document.getElementById('lb-name');
      const submitBtn = document.getElementById('lb-submit');
      const msgEl = document.getElementById('lb-msg');
      const lbOver = document.getElementById('lb-over');

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }

      async function submitScore() {
        // 이미 등록했거나 진행 중이면 무시(버튼 클릭·Enter 연타 모두 차단).
        if (lbSubmitted) return;
        const nm = nameInput.value.trim();
        if (!nm) { nameInput.focus(); return; }
        lbSubmitted = true; // 진행 중에도 재진입 차단 — 성공 시 유지, 실패 시 해제.
        submitBtn.disabled = true;
        msgEl.textContent = '등록 중…';
        try {
          const res = await fetch(SB_URL + '/rest/v1/rpc/submit_score', {
            method: 'POST',
            headers: SB_HEADERS,
            body: JSON.stringify({ p_nickname: nm, p_score: finalScore, p_mode: 'desktop', p_rule_preset: finalPreset }),
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          try { localStorage.setItem('yd_lb_name', nm); } catch {}
          msgEl.textContent = '✓ 등록 완료';
        } catch (err) {
          lbSubmitted = false; // 실패 → 재시도 허용.
          msgEl.textContent = '실패 (오프라인?)';
          submitBtn.disabled = false;
        }
      }

      async function openLb() {
        const list = document.getElementById('lb-list');
        lbOver.classList.remove('hidden');
        list.innerHTML = '<div class="lb-load">불러오는 중…</div>';
        try {
          // 현재 선택된 규칙(soloPreset) 보드를 보여준다.
          const res = await fetch(
            SB_URL + '/rest/v1/leaderboard?select=nickname,score,mode' +
              `&rule_preset_id=eq.${soloPreset}&order=score.desc,created_at.asc&limit=10`,
            { headers: SB_HEADERS },
          );
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const rows = await res.json();
          if (!rows.length) { list.innerHTML = '<div class="lb-load">아직 기록이 없습니다.</div>'; return; }
          list.innerHTML = rows
            .map((r, i) =>
              `<div class="lbrow"><span class="lbrank">${i + 1}</span>` +
              `<span class="lbnm">${escapeHtml(r.nickname)}</span>` +
              `<span class="lbsc">${r.score}</span></div>`)
            .join('');
        } catch (err) {
          list.innerHTML = '<div class="lb-load">불러오기 실패 (오프라인?)</div>';
        }
      }
      const closeLb = () => lbOver.classList.add('hidden');

      submitBtn.onclick = submitScore;
      document.getElementById('lb-open').onclick = openLb;
      document.getElementById('lb-close').onclick = closeLb;

      // ── 키보드 단축키 ──
      document.addEventListener('keydown', (e) => {
        // 멀티 화면이 떠 있으면 솔로 핸들러는 무시(멀티 전용 핸들러가 처리).
        if (!document.getElementById('mp').classList.contains('hidden')) return;
        // 리더보드 오버레이가 떠 있으면 Esc/Enter 로 닫기(창은 유지).
        if (!lbOver.classList.contains('hidden')) {
          if (e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); closeLb(); }
          return;
        }
        if (e.key === 'Escape') { e.preventDefault(); hidePopup(); return; }
        const overOpen = !document.getElementById('over').classList.contains('hidden');
        if (overOpen) {
          if (e.key === 'Enter') {
            e.preventDefault();
            // 닉네임 입력 중 Enter → 등록, 그 외 → 새 게임.
            if (document.activeElement === nameInput) submitScore();
            else reset();
          }
          return;
        }
        if (e.code === 'Space') { e.preventDefault(); roll(); return; }
        const di = HOLD_KEYS.indexOf(e.key);
        if (di >= 0) { e.preventDefault(); toggleHold(di); return; }
        const ci = CAT_KEYS.indexOf(e.key.toLowerCase());
        if (ci >= 0) { e.preventDefault(); pick(CATS[ci]); return; }
      });

      reset();
    </script>

    <script>
      // ── 온라인 멀티플레이 (Supabase 실시간; supabase-js 동봉) ──
      // 서버 권위. 웹앱(src/store/multiplayerStore.ts, src/lib/supabase.ts)을 바닐라로 포팅.
      // SB_URL/SB_KEY/SB_HEADERS/escapeHtml/CATS/CAT_KEYS/HOLD_KEYS/hidePopup 는 위 스크립트의 전역 재사용.
      const mpc = window.supabase.createClient(SB_URL, SB_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false },
      });

      // 로컬 카테고리 id ↔ 서버 camelCase id (양방향). assign 은 반드시 서버 id 로.
      const TO_SERVER = {
        ones: 'ones', twos: 'twos', threes: 'threes', fours: 'fours', fives: 'fives', sixes: 'sixes',
        choice: 'choice', fourkind: 'fourKind', fullhouse: 'fullHouse',
        small: 'smallStraight', large: 'largeStraight', yacht: 'yacht',
      };
      const UPPER_SRV = ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'];
      const LOWER_SRV = ['choice', 'fourKind', 'fullHouse', 'smallStraight', 'largeStraight', 'yacht'];

      // 에러 한글화(multiplayerStore.ts ERROR_KO 포팅).
      const MP_ERR_KO = [
        ['Anonymous sign-ins are disabled', '익명 로그인이 비활성화되어 있습니다. Supabase 대시보드에서 켜주세요.'],
        ['room not found', '방을 찾을 수 없습니다. 코드를 확인하세요.'],
        ['game already started', '이미 시작된 게임입니다.'],
        ['room is full', '방이 가득 찼습니다.'],
        ['need at least 2 players', '2명 이상이어야 시작할 수 있습니다.'],
        ['only host can start', '방장만 시작할 수 있습니다.'],
        ['not your turn', '당신의 차례가 아닙니다.'],
        ['category already filled', '이미 기록된 칸입니다.'],
        ['display name required', '닉네임을 입력하세요.'],
        ['invalid rule preset', '알 수 없는 규칙입니다.'],
      ];
      function mpHumanError(e) {
        const msg = (e && (e.message || e.error_description)) || String(e);
        if (/Failed to fetch|NetworkError|fetch failed/i.test(msg)) return '연결 실패 (오프라인?)';
        for (const [needle, ko] of MP_ERR_KO) if (msg.includes(needle)) return ko;
        return msg;
      }

      // ── 인증(익명, 멱등) + RPC ──
      let mpUserId = null;
      async function ensureAnon() {
        const { data: ex } = await mpc.auth.getSession();
        if (ex.session && ex.session.user) return (mpUserId = ex.session.user.id);
        const { data, error } = await mpc.auth.signInAnonymously();
        if (error) throw error;
        return (mpUserId = (data.user && data.user.id) || null);
      }
      async function rpc(name, params) {
        const { data, error } = await mpc.rpc(name, params || {});
        if (error) throw error;
        return data;
      }

      // snake → camel.
      function mapRoom(r) {
        return {
          id: r.id, code: r.code, status: r.status, helperAllowed: !!r.helper_allowed,
          rulePreset: r.rule_preset_id === 'additional' ? 'additional' : 'default',
          maxPlayers: r.max_players, hostId: r.host_id, currentSeat: r.current_seat, round: r.round,
          dice: r.dice || [], held: r.held || [], rollsUsed: r.rolls_used,
          winnerSeat: r.winner_seat, isTie: !!r.is_tie,
        };
      }
      function mapPlayer(p) {
        return {
          id: p.id, userId: p.user_id, seat: p.seat, displayName: p.display_name,
          isHost: !!p.is_host, connected: !!p.connected, scorecard: p.scorecard || { scores: {} },
        };
      }
      // 카드 총점. 추가 룰이면 보너스 가산(서버 scorecard_total 과 동일):
      //  · 요트의 달인: masterCells 1개당 +100(상단/하단 소계엔 미포함).
      //  · 요트도 포커처럼: 하단 4종 실제 조합(>0) 완성 시 +50.
      function scorecardTotal(sc, preset) {
        const p = preset || (mpRoom && mpRoom.rulePreset) || 'default';
        const s = (sc && sc.scores) || {};
        const u = UPPER_SRV.reduce((a, c) => a + (s[c] || 0), 0);
        const l = LOWER_SRV.reduce((a, c) => a + (s[c] || 0), 0);
        let t = u + (u >= 63 ? 35 : 0) + l;
        if (p === 'additional') {
          const master = (sc && sc.masterCells) || [];
          const lf = LOWER_FOUR_SRV.every((c) => (s[c] || 0) > 0);
          t += master.length * 100 + (lf ? 50 : 0);
        }
        return t;
      }
      // 내 보너스 칸(서버 id 배열).
      function myMaster() {
        const me = mpPlayers.find((p) => p.seat === mySeat);
        return (me && me.scorecard && me.scorecard.masterCells) || [];
      }
      // mp 보드에서 요트의 달인 발동 중인지(내 차례 + 요트 50 + 5개 같은 눈).
      function mpMasterActive() {
        if (!mpRoom || mpRoom.rulePreset !== 'additional') return false;
        const myTurn = mySeat !== null && mySeat === mpRoom.currentSeat;
        const dice = mpRoom.dice && mpRoom.dice.length === 5 ? mpRoom.dice : null;
        if (!myTurn || !dice || (mpRoom.rollsUsed || 0) === 0) return false;
        return (mySc().yacht || 0) === 50 && maxCount(dice) === 5;
      }

      // ── 상태 ──
      let mpRoom = null, mpPlayers = [], mySeat = null, mpChannel = null, mpSideOpen = false;
      // 상대 점수 패널에서 상세를 보고 있는 좌석(로컬 UI 전용). null = 내 좌석으로 폴백.
      let mpSelectedSeat = null;
      // 채팅(broadcast) — 최근 50개만 유지. mpChatSeen = 마지막으로 읽은 개수(안읽음 뱃지용).
      let mpMessages = [], mpChatOpen = false, mpChatSeen = 0;

      function recomputeMySeat() {
        const me = mpPlayers.find((p) => p.userId === mpUserId);
        mySeat = me ? me.seat : null;
      }
      // 현재 패널이 보여줄 좌석: 선택이 유효하면 그 좌석, 아니면 내 좌석.
      function sideSelectedSeat() {
        if (mpSelectedSeat != null && mpPlayers.some((p) => p.seat === mpSelectedSeat)) return mpSelectedSeat;
        return mySeat;
      }
      function setSideSeat(seat) {
        mpSelectedSeat = seat;
        if (mpSideOpen) renderSide();
      }
      function mySc() {
        const me = mpPlayers.find((p) => p.seat === mySeat);
        return (me && me.scorecard && me.scorecard.scores) || {};
      }

      // ── 화면 전환 ──
      function currentScreenName() {
        if (!document.getElementById('app').classList.contains('hidden')) return 'solo';
        for (const id of ['mp-lobby', 'mp-game', 'mp-over'])
          if (!document.getElementById(id).classList.contains('hidden')) return id;
        return 'mp-lobby';
      }
      function showScreen(name) {
        const solo = name === 'solo';
        document.getElementById('app').classList.toggle('hidden', !solo);
        document.getElementById('mp').classList.toggle('hidden', solo);
        if (!solo) {
          document.getElementById('over').classList.add('hidden');
          document.getElementById('lb-over').classList.add('hidden');
        }
        ['mp-lobby', 'mp-game', 'mp-over'].forEach((id) =>
          document.getElementById(id).classList.toggle('hidden', id !== name));
        if (name !== 'mp-game' && mpSideOpen) setSide(false); // 게임 밖에선 패널 접기
        if (solo && mpChatOpen) closeChat(); // 솔로로 나가면 채팅 닫기
      }
      function mpScreenForStatus(s) {
        return s === 'playing' ? 'mp-game' : s === 'finished' ? 'mp-over' : 'mp-lobby';
      }

      // ── 실시간 구독 + 리페치 ──
      function subscribeRoom(roomId) {
        if (mpChannel) { mpc.removeChannel(mpChannel); mpChannel = null; }
        // 새 방 구독이면 이전 방 채팅은 비운다.
        mpMessages = []; mpChatSeen = 0; renderChat(); updateChatBadges();
        mpChannel = mpc
          // self:true → 내가 보낸 메시지도 echo 되어 동일 경로로 표시(웹과 형식 동일).
          .channel('room:' + roomId, { config: { broadcast: { self: true } } })
          .on('broadcast', { event: 'chat' }, (msg) => onChatMessage(msg && msg.payload))
          .on('postgres_changes', { event: '*', schema: 'public', table: 'rooms', filter: 'id=eq.' + roomId }, () => refetchRoom())
          .on('postgres_changes', { event: '*', schema: 'public', table: 'room_players', filter: 'room_id=eq.' + roomId }, () => refetchRoom())
          .subscribe();
      }
      async function refetchRoom() {
        if (!mpRoom) return;
        const id = mpRoom.id;
        try {
          const [roomRes, playersRes] = await Promise.all([
            mpc.from('rooms').select('*').eq('id', id).maybeSingle(),
            mpc.from('room_players').select('*').eq('room_id', id).order('seat'),
          ]);
          if (!roomRes.data) { handleRoomGone(); return; }
          mpRoom = mapRoom(roomRes.data);
          if (playersRes.data) mpPlayers = playersRes.data.map(mapPlayer);
          recomputeMySeat();
          routeMpScreen();
          renderMp();
        } catch (e) { /* 오프라인 — 다음 이벤트/재오픈 때 갱신 */ }
      }
      function routeMpScreen() {
        if (!mpRoom) return;
        if (mpRoom.status === 'abandoned') { handleRoomGone(); return; }
        const target = mpScreenForStatus(mpRoom.status);
        if (currentScreenName() !== target) {
          showScreen(target);
          if (target === 'mp-over') initMpOver();
        }
      }
      function handleRoomGone() {
        if (mpChannel) { mpc.removeChannel(mpChannel); mpChannel = null; }
        mpRoom = null; mpPlayers = []; mySeat = null; mpSelectedSeat = null;
        mpMessages = []; mpChatSeen = 0; closeChat();
        try { localStorage.removeItem('yd_mp_code'); } catch (_) {}
        showScreen('mp-lobby'); renderLobby();
        setLobbyMsg('방이 종료되었습니다.');
      }

      // ── 렌더: 로비 ──
      function setLobbyMsg(t) { const e = document.getElementById('mp-msg'); if (e) e.textContent = t || ''; }
      function setRoomMsg(t) { const e = document.getElementById('mp-room-msg'); if (e) e.textContent = t || ''; }
      function setGameMsg(t) { const e = document.getElementById('mp-game-msg'); if (e) e.textContent = t || ''; }

      function renderLobby() {
        const inRoom = !!mpRoom;
        document.getElementById('mp-entry').classList.toggle('hidden', inRoom);
        document.getElementById('mp-room').classList.toggle('hidden', !inRoom);
        document.getElementById('mp-chat-open-l').classList.toggle('hidden', !inRoom); // 채팅은 방에 들어와야
        if (!inRoom) {
          try { document.getElementById('mp-name').value = localStorage.getItem('yd_mp_name') || ''; } catch (_) {}
          return;
        }
        document.getElementById('mp-code-show').textContent = mpRoom.code;
        const ruleLine = document.getElementById('mp-rule-line');
        if (ruleLine) ruleLine.textContent = RULE_KO[mpRoom.rulePreset] + (mpRoom.rulePreset === 'additional' ? ' · 헬퍼 없음' : '');
        document.getElementById('mp-players').innerHTML = mpPlayers
          .map((p) => {
            const host = p.isHost ? ' <span class="mp-tag">방장</span>' : '';
            const me = p.userId === mpUserId ? ' <span class="mp-tag">나</span>' : '';
            return `<div class="mp-prow"><span class="pn">${escapeHtml(p.displayName)}${host}${me}</span>` +
              `<span class="ps">${p.connected ? '' : '·'}</span></div>`;
          })
          .join('');
        const amHost = mpRoom.hostId === mpUserId;
        const startBtn = document.getElementById('mp-start');
        startBtn.classList.toggle('hidden', !amHost);
        startBtn.disabled = mpPlayers.length < 2;
        setRoomMsg('');
      }

      // ── 렌더: 게임 보드 ──
      function renderMpGame() {
        const room = mpRoom;
        if (!room) return;
        const myTurn = mySeat !== null && mySeat === room.currentSeat;
        const dice = room.dice && room.dice.length === 5 ? room.dice : null;
        const held = room.held && room.held.length === 5 ? room.held : [false, false, false, false, false];
        const rollsUsed = room.rollsUsed || 0;

        const active = mpPlayers.find((p) => p.seat === room.currentSeat);
        const mpm = mpMasterActive();
        document.getElementById('mp-turn-label').textContent = mpm
          ? '🎯 요트의 달인! 빈 칸 +100'
          : myTurn
            ? '내 차례'
            : (active ? active.displayName : '상대') + ' 차례';

        const dEl = document.getElementById('mp-dice');
        dEl.innerHTML = '';
        for (let i = 0; i < 5; i++) {
          const b = document.createElement('button');
          b.tabIndex = -1;
          b.className = 'die' + (held[i] ? ' held' : '') + (dice ? '' : ' empty');
          b.innerHTML = `<span class="k">${i + 1}</span>` + (dice ? `<span class="face">${dice[i]}</span>` : '');
          if (myTurn && dice && rollsUsed < 3) b.onclick = () => mpToggleHold(i);
          dEl.appendChild(b);
        }

        const rollBtn = document.getElementById('mp-roll');
        const rollsLeft = 3 - rollsUsed;
        rollBtn.textContent = myTurn ? (rollsLeft > 0 ? `굴리기 (${rollsLeft})` : '기록하세요') : '상대 차례…';
        rollBtn.disabled = !(myTurn && rollsLeft > 0);

        const cEl = document.getElementById('mp-cats');
        cEl.innerHTML = '';
        const scores = mySc();
        const masterSet = myMaster();
        CATS.forEach((cat, idx) => {
          const srv = TO_SERVER[cat.id];
          const isMaster = masterSet.includes(srv);
          const filled = scores[srv] != null || isMaster;
          const able = myTurn && dice && rollsUsed > 0 && !filled;
          const b = document.createElement('button');
          b.tabIndex = -1;
          b.className = 'cat' + (filled ? ' filled' : '') + (able ? ' able' : '') + (mpm && able ? ' master' : '');
          let pt;
          if (filled) pt = isMaster ? 100 : scores[srv];
          else if (mpm) pt = '+100';
          else pt = dice && rollsUsed > 0 ? cat.fn(dice) : '·';
          const badge = isMaster ? '<span class="mbadge">달인</span>' : '';
          b.innerHTML = `<span class="nm"><span class="k">${CAT_KEYS[idx]}</span>${cat.nm}${badge}</span><span class="pt">${pt}</span>`;
          if (able) b.onclick = () => mpPick(cat);
          cEl.appendChild(b);
        });

        document.getElementById('mp-total').innerHTML = `${scorecardTotal({ scores, masterCells: masterSet })}<small> 점</small>`;
        document.getElementById('mp-round').textContent = `${Math.min((room.round || 0) + 1, 12)} / 12`;
        if (mpSideOpen) renderSide();
      }

      // ── 렌더: 상대 점수 패널(백틱) ──
      function setSide(show) {
        mpSideOpen = !!show;
        document.getElementById('mp-side').classList.toggle('hidden', !mpSideOpen);
        if (window.yd && window.yd.setSide) window.yd.setSide(mpSideOpen);
        if (mpSideOpen) renderSide();
      }
      function toggleSide() { setSide(!mpSideOpen); }
      function renderSide() {
        const sel = sideSelectedSeat();
        const rows = mpPlayers
          .map((p) => {
            const filled = Object.keys((p.scorecard && p.scorecard.scores) || {}).length;
            const turn = mpRoom && p.seat === mpRoom.currentSeat;
            const selected = p.seat === sel;
            const cls = 'mp-prow' + (turn ? ' turn' : '') + (selected ? ' selected' : '');
            return `<div class="${cls}" data-seat="${p.seat}">` +
              `<span class="pn">${selected ? '▸ ' : ''}${escapeHtml(p.displayName)}</span>` +
              `<span class="ps">${scorecardTotal(p.scorecard)}<span class="pf"> ${filled}/12</span></span></div>`;
          })
          .join('');
        const side = document.getElementById('mp-side');
        side.innerHTML = '<div class="ph">플레이어</div>' + rows + renderSideDetail(sel);
        // 행 클릭 → 그 플레이어 상세 보기.
        side.querySelectorAll('.mp-prow').forEach((el) => {
          el.onclick = () => setSideSeat(Number(el.dataset.seat));
        });
      }
      // 선택 플레이어 상세 점수(2열 그리드: 상단 | 하단) + 요약.
      function renderSideDetail(seat) {
        const p = mpPlayers.find((x) => x.seat === seat);
        if (!p) return '';
        const sc = (p.scorecard && p.scorecard.scores) || {};
        const master = (p.scorecard && p.scorecard.masterCells) || [];
        const cell = (cat) => {
          const srv = TO_SERVER[cat.id];
          const isM = master.includes(srv);
          const v = isM ? 100 : sc[srv];
          const has = isM || v != null;
          return `<div class="mp-dcell"><span class="dnm">${cat.nm}${isM ? ' <span class="mbadge">달인</span>' : ''}</span>` +
            `<span class="dpt${has ? '' : ' e'}">${has ? v : '·'}</span></div>`;
        };
        let grid = '';
        for (let i = 0; i < 6; i++) grid += cell(CATS[i]) + cell(CATS[i + 6]);
        const up = UPPER_SRV.reduce((a, c) => a + (sc[c] || 0), 0);
        const total = scorecardTotal(p.scorecard);
        return `<div class="mp-side-detail">` +
          `<div class="ph mp-dhead">${escapeHtml(p.displayName)} 상세</div>` +
          `<div class="mp-dgrid">${grid}</div>` +
          `<div class="mp-dsum"><span>상단 ${up}/63${up >= 63 ? ' ✓' : ''}</span>` +
          `<span>합 ${total}</span></div></div>`;
      }

      // ── 렌더: 종료 ──
      let mpLbSubmitted = false;
      function initMpOver() {
        const msg = document.getElementById('mp-lb-msg');
        const btn = document.getElementById('mp-lb-submit');
        const nm = document.getElementById('mp-lb-name');
        if (msg) msg.textContent = '';
        if (btn) btn.disabled = false;
        mpLbSubmitted = false;
        try { if (nm) nm.value = localStorage.getItem('yd_lb_name') || localStorage.getItem('yd_mp_name') || ''; } catch (_) {}
      }
      function renderMpOver() {
        const room = mpRoom;
        if (!room) return;
        document.getElementById('mp-final').textContent = scorecardTotal({ scores: mySc(), masterCells: myMaster() });
        let result;
        if (room.isTie) result = '무승부';
        else {
          const w = mpPlayers.find((p) => p.seat === room.winnerSeat);
          result = w && w.seat === mySeat ? '🏆 승리!' : (w ? escapeHtml(w.displayName) : '상대') + ' 승';
        }
        document.getElementById('mp-result').innerHTML = result;
      }
      async function mpSubmitScore() {
        if (mpLbSubmitted) return;
        const input = document.getElementById('mp-lb-name');
        const nm = input.value.trim();
        if (!nm) { input.focus(); return; }
        mpLbSubmitted = true;
        const btn = document.getElementById('mp-lb-submit');
        const msg = document.getElementById('mp-lb-msg');
        btn.disabled = true; msg.textContent = '등록 중…';
        try {
          const myTotal = scorecardTotal({ scores: mySc(), masterCells: myMaster() });
          const preset = (mpRoom && mpRoom.rulePreset) || 'default';
          const res = await fetch(SB_URL + '/rest/v1/rpc/submit_score', {
            method: 'POST', headers: SB_HEADERS,
            body: JSON.stringify({ p_nickname: nm, p_score: myTotal, p_mode: 'multi', p_rule_preset: preset }),
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          try { localStorage.setItem('yd_lb_name', nm); } catch (_) {}
          msg.textContent = '✓ 등록 완료';
        } catch (e) {
          mpLbSubmitted = false; msg.textContent = '실패 (오프라인?)'; btn.disabled = false;
        }
      }

      function renderMp() {
        const s = currentScreenName();
        if (s === 'mp-lobby') renderLobby();
        else if (s === 'mp-game') renderMpGame();
        else if (s === 'mp-over') renderMpOver();
      }

      // ── 채팅(broadcast) ── 웹(multiplayerStore/ChatPanel)과 동일 채널/이벤트/payload.
      function hhmm(ts) {
        const d = new Date(ts || Date.now());
        const p = (n) => (n < 10 ? '0' + n : '' + n);
        return p(d.getHours()) + ':' + p(d.getMinutes());
      }
      function onChatMessage(m) {
        if (!m || typeof m.text !== 'string') return;
        mpMessages.push({ userId: m.userId, displayName: m.displayName, text: m.text, ts: m.ts });
        if (mpMessages.length > 50) mpMessages = mpMessages.slice(-50);
        if (mpChatOpen) { renderChat(); mpChatSeen = mpMessages.length; }
        updateChatBadges();
      }
      function renderChat() {
        const box = document.getElementById('mp-chat-msgs');
        if (!box) return;
        box.innerHTML = '';
        if (!mpMessages.length) {
          const e = document.createElement('div');
          e.className = 'mp-chat-empty';
          e.textContent = '아직 메시지가 없어요. 먼저 인사를 건네보세요!';
          box.appendChild(e);
          return;
        }
        for (const m of mpMessages) {
          const mine = m.userId === mpUserId;
          const row = document.createElement('div');
          row.className = 'mp-chat-msg' + (mine ? ' me' : '');
          const meta = document.createElement('div');
          meta.className = 'mp-chat-meta';
          const nm = document.createElement('span');
          nm.className = 'mp-chat-name';
          nm.textContent = mine ? '나' : (m.displayName || '익명'); // textContent → XSS 안전
          const tm = document.createElement('span');
          tm.className = 'mp-chat-time';
          tm.textContent = hhmm(m.ts);
          meta.appendChild(nm); meta.appendChild(tm);
          const bub = document.createElement('div');
          bub.className = 'mp-chat-bubble';
          bub.textContent = m.text; // textContent → XSS 안전
          row.appendChild(meta); row.appendChild(bub);
          box.appendChild(row);
        }
        box.scrollTop = box.scrollHeight;
      }
      function updateChatBadges() {
        const unread = mpChatOpen ? 0 : Math.max(0, mpMessages.length - mpChatSeen);
        document.querySelectorAll('.mp-chat-badge').forEach((b) => {
          if (unread > 0) { b.textContent = unread > 99 ? '99+' : String(unread); b.classList.remove('hidden'); }
          else b.classList.add('hidden');
        });
      }
      function openChat() {
        mpChatOpen = true;
        document.getElementById('mp-chat').classList.remove('hidden');
        renderChat();
        mpChatSeen = mpMessages.length;
        updateChatBadges();
        const i = document.getElementById('mp-chat-text');
        if (i) i.focus();
      }
      function closeChat() {
        mpChatOpen = false;
        document.getElementById('mp-chat').classList.add('hidden');
        updateChatBadges();
      }
      function toggleChat() { mpChatOpen ? closeChat() : openChat(); }
      function mpSendChat() {
        const input = document.getElementById('mp-chat-text');
        if (!input) return;
        const raw = (input.value || '').trim();
        if (!raw) return;
        const text = raw.slice(0, 200);
        if (!mpChannel || !mpUserId) { input.value = ''; return; }
        let name = '익명';
        const me = mpPlayers.find((p) => p.userId === mpUserId);
        if (me && me.displayName) name = me.displayName;
        else { try { name = localStorage.getItem('yd_mp_name') || '익명'; } catch (_) {} }
        mpChannel.send({ type: 'broadcast', event: 'chat', payload: { userId: mpUserId, displayName: name, text: text, ts: Date.now() } });
        input.value = '';
        input.focus();
      }

      // ── 액션(RPC) ──
      async function enterRoom(roomId) {
        mpRoom = { id: roomId, status: 'lobby', code: '', dice: [], held: [], rollsUsed: 0 };
        subscribeRoom(roomId);
        await refetchRoom();
      }
      let mpCreatePreset = 'default'; // 방 만들기에서 고른 규칙(추가 룰은 헬퍼 없음 — 데스크톱은 어차피 헬퍼 미존재).
      async function mpCreate() {
        const name = document.getElementById('mp-name').value.trim();
        if (!name) { document.getElementById('mp-name').focus(); return; }
        setLobbyMsg('만드는 중…');
        try {
          await ensureAnon();
          const data = await rpc('create_room', {
            p_display_name: name, p_helper_allowed: false, p_max_players: 4, p_rule_preset: mpCreatePreset,
          });
          try { localStorage.setItem('yd_mp_name', name); localStorage.setItem('yd_mp_code', data.code); } catch (_) {}
          await enterRoom(data.room_id);
        } catch (e) { setLobbyMsg(mpHumanError(e)); }
      }
      async function mpJoin() {
        const name = document.getElementById('mp-name').value.trim();
        const code = (document.getElementById('mp-code').value || '').trim().toUpperCase();
        if (!name) { document.getElementById('mp-name').focus(); return; }
        if (!code) { document.getElementById('mp-code').focus(); return; }
        setLobbyMsg('참가 중…');
        try {
          await ensureAnon();
          const data = await rpc('join_room', { p_code: code, p_display_name: name });
          try { localStorage.setItem('yd_mp_name', name); localStorage.setItem('yd_mp_code', data.code); } catch (_) {}
          await enterRoom(data.room_id);
        } catch (e) { setLobbyMsg(mpHumanError(e)); }
      }
      async function mpStart() {
        if (!mpRoom) return;
        try { await rpc('start_game', { p_room: mpRoom.id }); }
        catch (e) { setRoomMsg(mpHumanError(e)); }
      }
      async function mpRoll() {
        if (!mpRoom) return;
        setGameMsg('');
        try { await rpc('roll_dice', { p_room: mpRoom.id }); }
        catch (e) { setGameMsg(mpHumanError(e)); }
      }
      async function mpToggleHold(i) {
        if (!mpRoom) return;
        const base = mpRoom.held && mpRoom.held.length === 5 ? mpRoom.held.slice() : [false, false, false, false, false];
        base[i] = !base[i];
        mpRoom.held = base; renderMpGame(); // 낙관적(서버 스냅샷이 곧 덮어씀)
        try { await rpc('set_held', { p_room: mpRoom.id, p_held: base }); }
        catch (e) { setGameMsg(mpHumanError(e)); }
      }
      async function mpPick(cat) {
        if (!mpRoom) return;
        setGameMsg('');
        try { await rpc('assign_category', { p_room: mpRoom.id, p_category: TO_SERVER[cat.id] }); }
        catch (e) { setGameMsg(mpHumanError(e)); }
      }
      async function mpLeave() {
        const id = mpRoom && mpRoom.id;
        if (id) { try { await rpc('leave_room', { p_room: id }); } catch (_) {} }
        if (mpChannel) { mpc.removeChannel(mpChannel); mpChannel = null; }
        mpRoom = null; mpPlayers = []; mySeat = null; mpSelectedSeat = null;
        mpMessages = []; mpChatSeen = 0; closeChat();
        try { localStorage.removeItem('yd_mp_code'); } catch (_) {}
        showScreen('mp-lobby'); renderLobby(); setLobbyMsg('');
      }

      // ── 멀티 진입(트레이 '멀티플레이') ──
      async function enterMp() {
        if (mpRoom) { showScreen(mpScreenForStatus(mpRoom.status)); renderMp(); return; }
        showScreen('mp-lobby'); renderLobby(); setLobbyMsg('');
        try { await ensureAnon(); } catch (e) { setLobbyMsg(mpHumanError(e)); return; }
        let code = null, name = null;
        try { code = localStorage.getItem('yd_mp_code'); name = localStorage.getItem('yd_mp_name'); } catch (_) {}
        if (code && name) {
          setLobbyMsg('이전 방 확인 중…');
          try {
            const data = await rpc('join_room', { p_code: code, p_display_name: name });
            await enterRoom(data.room_id);
          } catch (e) {
            try { localStorage.removeItem('yd_mp_code'); } catch (_) {}
            setLobbyMsg(''); renderLobby();
          }
        }
      }

      // ── 버튼/키보드 배선 ──
      document.getElementById('mp-create').onclick = mpCreate;
      document.getElementById('mp-rule-toggle').onclick = (e) => {
        mpCreatePreset = mpCreatePreset === 'default' ? 'additional' : 'default';
        e.currentTarget.textContent = RULE_KO[mpCreatePreset];
      };
      document.getElementById('mp-join').onclick = mpJoin;
      document.getElementById('mp-start').onclick = mpStart;
      document.getElementById('mp-roll').onclick = mpRoll;
      document.getElementById('mp-leave').onclick = hidePopup; // 로비 ✕ = 숨김(좌석 유지)
      document.getElementById('mp-room-leave').onclick = mpLeave; // 방 나가기
      document.getElementById('mp-code-copy').onclick = async () => { // 초대 코드 클립보드 복사
        if (!mpRoom || !mpRoom.code) return;
        try {
          await navigator.clipboard.writeText(mpRoom.code);
          const btn = document.getElementById('mp-code-copy');
          const orig = btn.textContent;
          btn.textContent = '✓ 복사됨';
          setTimeout(() => { btn.textContent = orig; }, 1500);
        } catch (e) { console.warn('clipboard write failed', e); }
      };
      document.getElementById('mp-game-leave').onclick = hidePopup; // 게임 ✕ = 숨김
      document.getElementById('mp-game-quit').onclick = mpLeave; // 게임에서 방 나가기
      document.getElementById('mp-again').onclick = mpLeave; // 종료 → 로비로
      document.getElementById('mp-lb-submit').onclick = mpSubmitScore;
      document.getElementById('mp-chat-open-l').onclick = toggleChat; // 로비 채팅
      document.getElementById('mp-chat-open-g').onclick = toggleChat; // 게임 채팅
      document.getElementById('mp-chat-close').onclick = closeChat;
      document.getElementById('mp-chat-send').onclick = mpSendChat;

      document.addEventListener('keydown', (e) => {
        const screen = currentScreenName();
        if (screen === 'solo') return; // 솔로는 기존 핸들러가 처리
        // 채팅 오버레이가 떠 있으면 전용 처리(Esc=닫기, Enter=전송). 그 외 단축키는 차단.
        if (mpChatOpen) {
          if (e.key === 'Escape') { e.preventDefault(); closeChat(); return; }
          if (e.key === 'Enter' && !e.isComposing &&
              document.activeElement && document.activeElement.id === 'mp-chat-text') {
            e.preventDefault(); mpSendChat();
          }
          return;
        }
        const tag = (document.activeElement && document.activeElement.tagName) || '';
        if (tag === 'INPUT') {
          if (e.key === 'Escape') { e.preventDefault(); document.activeElement.blur(); }
          return; // 닉네임/코드 입력 중엔 단축키 가로채지 않음
        }
        if (e.key === 'Escape') { e.preventDefault(); hidePopup(); return; }
        if (screen === 'mp-game') {
          if (e.key === '`') { e.preventDefault(); toggleSide(); return; }
          // 상대 점수 패널이 열려 있으면 ↑/↓ 로 선택 좌석 이동(턴 무관).
          if (mpSideOpen && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
            e.preventDefault();
            const seats = mpPlayers.map((p) => p.seat).sort((a, b) => a - b);
            if (!seats.length) return;
            let idx = seats.indexOf(sideSelectedSeat());
            if (idx < 0) idx = 0;
            idx = e.key === 'ArrowUp' ? Math.max(0, idx - 1) : Math.min(seats.length - 1, idx + 1);
            setSideSeat(seats[idx]);
            return;
          }
          const room = mpRoom;
          if (!room) return;
          const myTurn = mySeat !== null && mySeat === room.currentSeat;
          if (!myTurn) return;
          const hasDice = room.dice && room.dice.length === 5;
          const rollsUsed = room.rollsUsed || 0;
          if (e.code === 'Space') { e.preventDefault(); if (rollsUsed < 3) mpRoll(); return; }
          const di = HOLD_KEYS.indexOf(e.key);
          if (di >= 0) { e.preventDefault(); if (hasDice && rollsUsed > 0 && rollsUsed < 3) mpToggleHold(di); return; }
          const ci = CAT_KEYS.indexOf(e.key.toLowerCase());
          if (ci >= 0) { e.preventDefault(); if (hasDice && rollsUsed > 0) mpPick(CATS[ci]); return; }
        } else if (screen === 'mp-over' && e.key === 'Enter') {
          e.preventDefault(); mpLeave();
        }
      });

      // 트레이 메뉴(싱글/멀티)가 보낸 모드 구독. 창 재표시 때마다 투명도 팝오버는 닫힌 상태로 리셋.
      if (window.yd && window.yd.onMode) {
        window.yd.onMode((mode) => { closeOpacityPop(); if (mode === 'mp') enterMp(); else showScreen('solo'); });
      }

      // 테마: 메인(settings.json)이 단일 출처 — 로드/변경 시 받아 적용(localStorage 캐시도 동기화).
      if (window.yd && window.yd.onTheme) {
        window.yd.onTheme((mode) => applyTheme(mode));
      }

      // 투명도: 메인(settings.json)이 단일 출처 — 초기/저장값을 받아 슬라이더·라벨 동기화.
      if (window.yd && window.yd.onOpacity) {
        window.yd.onOpacity((v) => applyOpacityUI(v));
      }
    </script>
  </body>
</html>
