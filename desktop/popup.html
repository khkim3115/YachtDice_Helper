<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>설정</title>
    <style>
      /* 눈에 띄지 않게 — 어두운 단색(검정/회색)만. 파랑/노랑/초록 없음. */
      :root {
        --bg: #0b0b0d;
        --panel: #151518;
        --panel2: #1d1d21;
        --panel3: #26262b;
        --line: #2a2a2f;
        --txt: #c6c6cd;
        --mut: #71717a;
        --emph: #d7d7de;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: 'Segoe UI', system-ui, 'Malgun Gothic', sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
      #app { display: flex; flex-direction: column; height: 100vh; padding: 7px 8px 8px; gap: 6px; }

      .top { display: flex; align-items: center; justify-content: space-between; }
      .logo { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--mut); }
      .x { border: none; background: transparent; color: var(--mut); font-size: 11px; cursor: pointer; padding: 2px 4px; line-height: 1; }
      .x:hover { color: var(--txt); }

      .dice { display: flex; gap: 4px; justify-content: center; }
      .die {
        position: relative;
        width: 30px; height: 30px; border-radius: 5px;
        background: var(--panel2); border: 1px solid var(--line); color: var(--emph);
        display: grid; place-items: center; font-size: 15px; font-weight: 700;
        cursor: pointer; flex: none;
      }
      .die.empty { color: transparent; background: var(--panel); }
      .die.held { border-color: #56565f; background: var(--panel3); }

      .roll {
        border: 1px solid var(--line); border-radius: 5px; padding: 7px; font-size: 12px; font-weight: 600;
        color: var(--txt); cursor: pointer; background: var(--panel2);
      }
      .roll:hover { background: var(--panel3); }
      .roll:disabled { opacity: 0.45; cursor: default; }

      .cats { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
      .cat {
        display: flex; align-items: center; justify-content: space-between;
        border: 1px solid var(--line); border-radius: 4px; background: var(--panel);
        padding: 4px 6px; font-size: 10.5px; cursor: default; color: var(--mut);
        text-align: left; gap: 4px; min-width: 0;
      }
      .cat .nm { color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .k { font-size: 8px; color: #50505a; text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px; }
      .cat .k { display: inline-block; min-width: 8px; margin-right: 4px; }
      .die .k { position: absolute; top: 1px; left: 3px; line-height: 1; }
      .x .k { margin-right: 4px; }
      .roll .k, .again .k { margin-left: 5px; }
      .cat .pt { font-variant-numeric: tabular-nums; flex: none; }
      .cat.able { cursor: pointer; background: var(--panel2); border-color: var(--panel3); }
      .cat.able .pt { color: var(--emph); }
      .cat.able:hover { background: var(--panel3); }
      .cat.filled { opacity: 0.4; }
      .cat.filled .pt { color: var(--txt); }

      .foot { display: flex; align-items: center; justify-content: space-between; font-size: 10.5px; color: var(--mut); }
      .foot .total { font-size: 13px; font-weight: 700; color: var(--emph); }
      .foot .total small { font-size: 9px; color: var(--mut); font-weight: 600; }
      .bonus { color: var(--mut); }
      .new { border: 1px solid var(--line); background: var(--panel2); color: var(--mut); border-radius: 4px; padding: 3px 7px; cursor: pointer; font-size: 11px; }
      .new:hover { color: var(--txt); }

      .over { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); display: grid; place-items: center; }
      .over.hidden { display: none; }
      .overcard { text-align: center; }
      .overcard .big { font-size: 36px; font-weight: 700; color: var(--emph); line-height: 1; }
      .overcard .ko { color: var(--mut); font-size: 11px; margin: 4px 0 12px; }
      .again { border: 1px solid var(--line); border-radius: 5px; padding: 7px 18px; font-weight: 600; color: var(--txt); cursor: pointer; background: var(--panel2); }
      .again:hover { background: var(--panel3); }

      /* ── 리더보드 ── */
      .top-btns { display: flex; align-items: center; gap: 2px; }
      .lb-reg { margin: 12px auto 0; display: flex; flex-direction: column; gap: 5px; width: 152px; }
      .lb-input { background: var(--panel2); border: 1px solid var(--line); border-radius: 4px; color: var(--txt); padding: 5px 7px; font-size: 11px; font-family: inherit; outline: none; text-align: center; }
      .lb-input:focus { border-color: #56565f; }
      .lb-btn { border: 1px solid var(--line); border-radius: 4px; background: var(--panel2); color: var(--txt); padding: 5px; font-size: 11px; font-weight: 600; cursor: pointer; }
      .lb-btn:hover { background: var(--panel3); }
      .lb-btn:disabled { opacity: 0.5; cursor: default; }
      .lb-msg { font-size: 10px; color: var(--mut); min-height: 12px; text-align: center; }
      .lbcard { width: 232px; max-height: 320px; display: flex; flex-direction: column; gap: 8px; }
      .lbtitle { font-size: 12px; font-weight: 700; color: var(--emph); text-align: center; }
      .lblist { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; }
      .lbrow { display: grid; grid-template-columns: 20px 1fr auto; align-items: center; gap: 6px; padding: 4px 7px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel); font-size: 11px; }
      .lbrank { color: var(--mut); font-size: 10px; font-weight: 700; text-align: center; }
      .lbnm { color: var(--txt); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .lbsc { color: var(--emph); font-weight: 700; font-variant-numeric: tabular-nums; }
      .lb-load { color: var(--mut); font-size: 11px; text-align: center; padding: 16px 0; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="top">
        <span class="logo">설정</span>
        <div class="top-btns">
          <button class="x" id="lb-open" title="리더보드" tabindex="-1">🏆</button>
          <button class="x" id="close" title="닫기 (Esc)" tabindex="-1"><span class="k">Esc</span>✕</button>
        </div>
      </div>
      <div class="dice" id="dice"></div>
      <button class="roll" id="roll" tabindex="-1">굴리기</button>
      <div class="cats" id="cats"></div>
      <div class="foot">
        <span class="total" id="total">0<small> 점</small></span>
        <span id="turn">1 / 12</span>
        <button class="new" id="new" title="새로" tabindex="-1">↺ 새로</button>
      </div>
    </div>

    <div class="over hidden" id="over">
      <div class="overcard">
        <div class="big" id="final">0</div>
        <div class="ko">완료</div>
        <button class="again" id="again" tabindex="-1">다시<span class="k">Enter</span></button>
        <div class="lb-reg">
          <input class="lb-input" id="lb-name" maxlength="24" placeholder="닉네임" />
          <button class="lb-btn" id="lb-submit" tabindex="-1">🏆 리더보드 등록</button>
          <div class="lb-msg" id="lb-msg"></div>
        </div>
      </div>
    </div>

    <div class="over hidden" id="lb-over">
      <div class="lbcard">
        <div class="lbtitle">🏆 리더보드 Top 10</div>
        <div class="lblist" id="lb-list"></div>
        <button class="again" id="lb-close" tabindex="-1">닫기<span class="k">Esc</span></button>
      </div>
    </div>

    <script>
      // ── 최소 싱글플레이 요트다이스 ──
      const CATS = [
        { id: 'ones', nm: '원', fn: (d) => up(d, 1) },
        { id: 'twos', nm: '투', fn: (d) => up(d, 2) },
        { id: 'threes', nm: '쓰리', fn: (d) => up(d, 3) },
        { id: 'fours', nm: '포', fn: (d) => up(d, 4) },
        { id: 'fives', nm: '파이브', fn: (d) => up(d, 5) },
        { id: 'sixes', nm: '식스', fn: (d) => up(d, 6) },
        { id: 'choice', nm: '초이스', fn: (d) => sum(d) },
        { id: 'fourkind', nm: '포카드', fn: (d) => (maxCount(d) >= 4 ? sum(d) : 0) },
        { id: 'fullhouse', nm: '풀하우스', fn: fullHouse },
        { id: 'small', nm: '스몰', fn: (d) => (straight(d) >= 4 ? 15 : 0) },
        { id: 'large', nm: '라지', fn: (d) => (straight(d) >= 5 ? 30 : 0) },
        { id: 'yacht', nm: '야추', fn: (d) => (maxCount(d) === 5 ? 50 : 0) },
      ];
      const UPPER = ['ones', 'twos', 'threes', 'fours', 'fives', 'sixes'];
      // 단축키: 주사위 잠금 1~5, 점수 12칸 = QWERTYUIOP[] (CATS 순서).
      const HOLD_KEYS = ['1', '2', '3', '4', '5'];
      const CAT_KEYS = ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p', '[', ']'];

      function counts(d) { const c = [0, 0, 0, 0, 0, 0, 0]; d.forEach((x) => c[x]++); return c; }
      function up(d, n) { return d.filter((x) => x === n).length * n; }
      function sum(d) { return d.reduce((a, b) => a + b, 0); }
      function maxCount(d) { return Math.max(...counts(d).slice(1)); }
      function fullHouse(d) { const c = counts(d).slice(1).filter((x) => x > 0).sort(); return c.length === 2 && c[0] === 2 && c[1] === 3 ? sum(d) : 0; }
      function straight(d) {
        const s = [...new Set(d)].sort((a, b) => a - b);
        let run = 1, best = 1;
        for (let i = 1; i < s.length; i++) { if (s[i] === s[i - 1] + 1) { run++; best = Math.max(best, run); } else run = 1; }
        return best;
      }

      let state;
      function reset() {
        state = { dice: [1, 1, 1, 1, 1], held: [false, false, false, false, false], rolls: 3, rolled: false, filled: {}, turn: 0 };
        document.getElementById('over').classList.add('hidden');
        render();
      }

      function roll() {
        if (state.rolls <= 0) return;
        state.dice = state.dice.map((v, i) => (state.rolled && state.held[i] ? v : 1 + Math.floor(Math.random() * 6)));
        state.rolls--;
        state.rolled = true;
        render();
      }

      function toggleHold(i) {
        if (!state.rolled || state.rolls === 0 || state.rolls === 3) return;
        state.held[i] = !state.held[i];
        render();
      }

      function pick(cat) {
        if (!state.rolled || state.filled[cat.id] != null) return;
        state.filled[cat.id] = cat.fn(state.dice);
        state.turn++;
        if (state.turn >= 12) return gameOver();
        state.dice = [1, 1, 1, 1, 1];
        state.held = [false, false, false, false, false];
        state.rolls = 3;
        state.rolled = false;
        render();
      }

      function upperSub() { return UPPER.reduce((a, id) => a + (state.filled[id] || 0), 0); }
      function bonus() { return upperSub() >= 63 ? 35 : 0; }
      function total() { return Object.values(state.filled).reduce((a, b) => a + b, 0) + bonus(); }

      let finalScore = 0;
      let lbSubmitted = false; // 이번 게임 점수를 이미(또는 진행 중) 등록했는지 — 중복 등록 방지.
      function gameOver() {
        render();
        finalScore = total();
        document.getElementById('final').textContent = finalScore;
        document.getElementById('over').classList.remove('hidden');
        // 리더보드 등록 UI 초기화(데스크톱은 헬퍼가 없어 항상 등록 가능).
        const msg = document.getElementById('lb-msg');
        const btn = document.getElementById('lb-submit');
        const nm = document.getElementById('lb-name');
        if (msg) msg.textContent = '';
        if (btn) btn.disabled = false;
        lbSubmitted = false; // 새 게임 점수 → 다시 등록 가능.
        try { if (nm) nm.value = localStorage.getItem('yd_lb_name') || ''; } catch {}
      }

      const diceEl = document.getElementById('dice');
      const catsEl = document.getElementById('cats');

      function render() {
        diceEl.innerHTML = '';
        state.dice.forEach((v, i) => {
          const d = document.createElement('button');
          d.tabIndex = -1;
          d.className = 'die' + (state.held[i] ? ' held' : '') + (state.rolled ? '' : ' empty');
          d.innerHTML = `<span class="k">${i + 1}</span>` + (state.rolled ? `<span class="face">${v}</span>` : '');
          d.onclick = () => toggleHold(i);
          diceEl.appendChild(d);
        });

        const rollBtn = document.getElementById('roll');
        rollBtn.innerHTML = state.rolls > 0 ? `굴리기 (${state.rolls}) <span class="k">Space</span>` : '기록';
        rollBtn.disabled = state.rolls <= 0;

        catsEl.innerHTML = '';
        CATS.forEach((cat, idx) => {
          const filled = state.filled[cat.id] != null;
          const able = !filled && state.rolled;
          const b = document.createElement('button');
          b.tabIndex = -1;
          b.className = 'cat' + (filled ? ' filled' : '') + (able ? ' able' : '');
          const pt = filled ? state.filled[cat.id] : state.rolled ? cat.fn(state.dice) : '·';
          b.innerHTML = `<span class="nm"><span class="k">${CAT_KEYS[idx]}</span>${cat.nm}</span><span class="pt">${pt}</span>`;
          if (able) b.onclick = () => pick(cat);
          catsEl.appendChild(b);
        });

        const bn = bonus();
        document.getElementById('total').innerHTML =
          `${total()}<small> 점</small>` + (bn ? ` <span class="bonus">+${bn}</span>` : '');
        document.getElementById('turn').textContent = `${Math.min(state.turn + 1, 12)} / 12`;
      }

      document.getElementById('roll').onclick = roll;
      document.getElementById('new').onclick = reset;
      document.getElementById('again').onclick = reset;
      // 닫지 않고 숨기기만(상태 유지). preload 미주입 시 close 로 폴백.
      const hidePopup = () => (window.yd ? window.yd.hide() : window.close());
      document.getElementById('close').onclick = hidePopup;

      // ── 리더보드(Supabase REST 직접 호출, 익명 anon 키) ──
      // publishable 키는 공개용 — 커밋·배포 안전(service_role 아님).
      const SB_URL = 'https://wrdeqbqwxnmjsbwwnatx.supabase.co';
      const SB_KEY = 'sb_publishable_3QuWFZBMzYOdMpfkMjROtw_FBex-xM6';
      const SB_HEADERS = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
      const nameInput = document.getElementById('lb-name');
      const submitBtn = document.getElementById('lb-submit');
      const msgEl = document.getElementById('lb-msg');
      const lbOver = document.getElementById('lb-over');

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }

      async function submitScore() {
        // 이미 등록했거나 진행 중이면 무시(버튼 클릭·Enter 연타 모두 차단).
        if (lbSubmitted) return;
        const nm = nameInput.value.trim();
        if (!nm) { nameInput.focus(); return; }
        lbSubmitted = true; // 진행 중에도 재진입 차단 — 성공 시 유지, 실패 시 해제.
        submitBtn.disabled = true;
        msgEl.textContent = '등록 중…';
        try {
          const res = await fetch(SB_URL + '/rest/v1/rpc/submit_score', {
            method: 'POST',
            headers: SB_HEADERS,
            body: JSON.stringify({ p_nickname: nm, p_score: finalScore, p_mode: 'desktop' }),
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          try { localStorage.setItem('yd_lb_name', nm); } catch {}
          msgEl.textContent = '✓ 등록 완료';
        } catch (err) {
          lbSubmitted = false; // 실패 → 재시도 허용.
          msgEl.textContent = '실패 (오프라인?)';
          submitBtn.disabled = false;
        }
      }

      async function openLb() {
        const list = document.getElementById('lb-list');
        lbOver.classList.remove('hidden');
        list.innerHTML = '<div class="lb-load">불러오는 중…</div>';
        try {
          const res = await fetch(
            SB_URL + '/rest/v1/leaderboard?select=nickname,score,mode&order=score.desc,created_at.asc&limit=10',
            { headers: SB_HEADERS },
          );
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const rows = await res.json();
          if (!rows.length) { list.innerHTML = '<div class="lb-load">아직 기록이 없습니다.</div>'; return; }
          list.innerHTML = rows
            .map((r, i) =>
              `<div class="lbrow"><span class="lbrank">${i + 1}</span>` +
              `<span class="lbnm">${escapeHtml(r.nickname)}</span>` +
              `<span class="lbsc">${r.score}</span></div>`)
            .join('');
        } catch (err) {
          list.innerHTML = '<div class="lb-load">불러오기 실패 (오프라인?)</div>';
        }
      }
      const closeLb = () => lbOver.classList.add('hidden');

      submitBtn.onclick = submitScore;
      document.getElementById('lb-open').onclick = openLb;
      document.getElementById('lb-close').onclick = closeLb;

      // ── 키보드 단축키 ──
      document.addEventListener('keydown', (e) => {
        // 리더보드 오버레이가 떠 있으면 Esc/Enter 로 닫기(창은 유지).
        if (!lbOver.classList.contains('hidden')) {
          if (e.key === 'Escape' || e.key === 'Enter') { e.preventDefault(); closeLb(); }
          return;
        }
        if (e.key === 'Escape') { e.preventDefault(); hidePopup(); return; }
        const overOpen = !document.getElementById('over').classList.contains('hidden');
        if (overOpen) {
          if (e.key === 'Enter') {
            e.preventDefault();
            // 닉네임 입력 중 Enter → 등록, 그 외 → 새 게임.
            if (document.activeElement === nameInput) submitScore();
            else reset();
          }
          return;
        }
        if (e.code === 'Space') { e.preventDefault(); roll(); return; }
        const di = HOLD_KEYS.indexOf(e.key);
        if (di >= 0) { e.preventDefault(); toggleHold(di); return; }
        const ci = CAT_KEYS.indexOf(e.key.toLowerCase());
        if (ci >= 0) { e.preventDefault(); pick(CATS[ci]); return; }
      });

      reset();
    </script>
  </body>
</html>
