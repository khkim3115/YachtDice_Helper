<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2440" />
      <stop offset="0.55" stop-color="#0c1020" />
      <stop offset="1" stop-color="#0a0d18" />
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#4f6fff" stop-opacity="0.5" />
      <stop offset="1" stop-color="#4f6fff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#dde5ff" />
    </linearGradient>
    <radialGradient id="pip" cx="0.35" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#ffd987" />
      <stop offset="1" stop-color="#ffb01f" />
    </radialGradient>
  </defs>

  <!-- background (full-bleed for maskable safety) -->
  <rect width="512" height="512" fill="url(#bg)" />
  <rect width="512" height="512" fill="url(#glow)" />

  <!-- die drop shadow -->
  <rect x="128" y="142" width="256" height="256" rx="56" fill="#04060d" opacity="0.45" />

  <!-- die face -->
  <rect x="128" y="128" width="256" height="256" rx="56" fill="url(#face)" />
  <!-- top gloss -->
  <rect x="146" y="146" width="220" height="96" rx="44" fill="#ffffff" opacity="0.45" />

  <!-- five gold pips (quincunx — Yacht / five-of-a-kind) -->
  <circle cx="188" cy="188" r="27" fill="url(#pip)" />
  <circle cx="324" cy="188" r="27" fill="url(#pip)" />
  <circle cx="256" cy="256" r="27" fill="url(#pip)" />
  <circle cx="188" cy="324" r="27" fill="url(#pip)" />
  <circle cx="324" cy="324" r="27" fill="url(#pip)" />
</svg>
